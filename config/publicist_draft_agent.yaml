run:
  output_dir: out
  data_dir: data
  params_dir: params
  "runtime.sqlite": runtime/publicist.sqlite
  review_owner: publicist-team

artifacts:
  source_material:
    target: out/source_material.yaml
  audience_profiles:
    target: out/audience_profiles.yaml
  contact_ledger:
    target: out/contact_ledger.yaml
  message_drafts:
    target: out/message_drafts.yaml
  review_decisions:
    target: out/review_decisions.yaml
  sqlite_load_report:
    target: out/sqlite_load_report.yaml
  sqlite_init_report:
    target: out/sqlite_init_report.yaml
  sqlite_write_report:
    target: out/sqlite_write_report.yaml
  sqlite_insights:
    target: out/sqlite_insights.yaml
  next_actions:
    target: out/next_actions.yaml
  research_requests:
    target: out/research_requests.yaml
  research_results:
    target: out/research_results.yaml
  enriched_drafts:
    target: out/enriched_drafts.yaml
  review_packet:
    target: out/review_packet.md

load_material:
  run: ../agents/publicist/load_material.coffee
  depends_on: []
  needs: []
  makes: [source_material]
  source_file: source/publicist_source.txt
  announcement_date: "2026-05-18"
  review_goal: Prepare reviewed outreach drafts only.

identify_audiences:
  run: ../agents/publicist/identify_audiences.coffee
  depends_on: [load_material]
  needs: [source_material]
  makes: [audience_profiles]

build_contact_ledger:
  run: ../agents/publicist/build_contact_ledger.coffee
  depends_on: [identify_audiences]
  needs: [audience_profiles]
  makes: [contact_ledger]

draft_messages:
  run: ../agents/publicist/draft_messages.coffee
  depends_on: [build_contact_ledger]
  needs: [source_material, audience_profiles, contact_ledger]
  makes: [message_drafts]
  call_to_action: Invite reviewed outreach to cover or list opening weekend.
  signature_name: Campaign Team

init_review_decisions:
  run: ../agents/publicist/init_review_decisions.coffee
  depends_on: [draft_messages]
  needs: [message_drafts]
  makes: [review_decisions]

validate_sqlite_load:
  run: ../agents/publicist/validate_sqlite_load.coffee
  depends_on: [init_review_decisions]
  needs: [audience_profiles, contact_ledger, message_drafts, review_decisions]
  makes: [sqlite_load_report]

init_sqlite_memory:
  run: ../agents/publicist/init_sqlite_memory.coffee
  depends_on: [validate_sqlite_load]
  needs: []
  makes: [sqlite_init_report]
  schema_path: db/publicist/schema.sql

write_sqlite_memory:
  run: ../agents/publicist/write_sqlite_memory.coffee
  depends_on: [init_sqlite_memory]
  needs: [contact_ledger, message_drafts, review_decisions]
  makes: [sqlite_write_report]

query_sqlite_memory:
  run: ../agents/publicist/query_sqlite_memory.coffee
  depends_on: [write_sqlite_memory]
  needs: []
  makes: [sqlite_insights]

recommend_next_actions:
  run: ../agents/publicist/recommend_next_actions.coffee
  depends_on: [query_sqlite_memory]
  needs: [sqlite_insights, contact_ledger, review_decisions]
  makes: [next_actions]
  stale_after_days: 14

plan_research_requests:
  run: ../agents/publicist/plan_research_requests.coffee
  depends_on: [recommend_next_actions]
  needs: [contact_ledger, audience_profiles, next_actions]
  makes: [research_requests]

fetch_research:
  run: ../agents/publicist/fetch_research.coffee
  depends_on: [plan_research_requests]
  needs: [research_requests]
  makes: [research_results]
  timeout_ms: 5000
  max_response_bytes: 262144

enrich_drafts_with_research:
  run: ../agents/publicist/enrich_drafts_with_research.coffee
  depends_on: [fetch_research]
  needs: [research_results, message_drafts, review_decisions]
  makes: [enriched_drafts]

write_review_packet:
  run: ../agents/publicist/write_review_packet.coffee
  depends_on: [enrich_drafts_with_research]
  needs: [source_material, audience_profiles, contact_ledger, message_drafts, review_decisions, sqlite_load_report, next_actions, research_requests, research_results, enriched_drafts]
  makes: [review_packet]
  reviewers:
    - editorial_review
    - brand_review
    - founder_approval
  review_deadline: "2026-05-12"
