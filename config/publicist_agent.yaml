# Draft recipe only. This file does not participate in current pipeline runs.

role:
  name: publicist_agent
  mode: draft_only
  summary: >
    Experimental planner layer for publicity work that proposes reviewed
    actions above the existing pipeline and Memo system.

allowed_intents:
  - outline_outreach_plan
  - draft_contact_brief
  - prepare_follow_up_draft
  - request_lookup_via_approved_device
  - request_review_before_release

sandbox_policy:
  direct_os_access: false
  direct_network_access: false
  direct_filesystem_access: false
  memo_bypass_allowed: false
  execution_rule: >
    All actions must route through Memo, meta devices, and explicitly approved
    step devices.

proposed_devices:
  - name: memo_intent_writer
    purpose: Record proposed intents, drafts, and approval requests in Memo.
    status: proposed_only
  - name: reviewed_contact_ledger_device
    purpose: Store normalized contact and outreach state behind Memo.
    status: future_phase
  - name: allowlisted_http_lookup_device
    purpose: Perform constrained network lookup after explicit approval.
    status: future_phase
  - name: reviewed_send_log_device
    purpose: Send approved outreach and log the result through Memo.
    status: future_phase

review_gates:
  public_outreach_requires_human_review: true
  network_posting_requires_human_review: true
  contact_creation_requires_human_review: true
  send_requires_human_review: true

ledger_artifacts:
  - agent/intents/publicist.yaml
  - agent/drafts/outreach_message.md
  - agent/review/publicist_review.yaml
  - agent/logs/follow_up_queue.yaml
