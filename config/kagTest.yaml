run:
  model: TinyLlama/TinyLlama-1.1B-Chat-v1.0
  output_dir: out
  data_dir: data
  training_dir: build/train

artifacts:
  kag_record:         { target: out/kag_record.json }
  prompt_cache_spec:  { target: out/prompt_cache_spec.json }
  cached_prompt_text: { target: out/cached_prompt_text.txt }

download_model:
  run: story/hf_download.coffee
  depends_on: []
  needs: []
  makes: []
  loraLand: build/model

md2segments:
  run: train_markdown/md2segments.coffee
  depends_on: [download_model]
  needs: []
  makes: []
  stories_md: data/jim.md
  marshalled_stories: data//marshalled_stories.jsonl
  split_mode: story

oracle_ask:
  run: train_markdown/oracle_ask.coffee
  depends_on: [md2segments]
  needs: []
  makes: []
  marshalled_stories: data//marshalled_stories.jsonl
  kag_emotions: data/kag_emotions.jsonl
  batch_size: 4
  max_tokens: 1000

reply_merge:
  run: train_markdown/reply_merge.coffee
  depends_on: [oracle_ask]
  needs: []
  makes: []
  marshalled_stories: data//marshalled_stories.jsonl
  kag_emotions: out/kag_emotions.jsonl
  merged_segments: out/merged_segments.jsonl

extract_kag:
  run: jim/extract_kag.coffee
  depends_on: [reply_merge]
  needs: []
  makes: [kag_record]
  kag_source_key: out/merged_segments.jsonl
  sample_index: 0

rotate_merged:
  run: train_markdown/rotate_merged.coffee
  depends_on: [reply_merge]
  needs: []
  makes: []
  merged_segments: out/merged_segments.jsonl
  train_file: build/train/train.jsonl
  valid_file: build/train/valid.jsonl
  test_file: build/train/test.jsonl

